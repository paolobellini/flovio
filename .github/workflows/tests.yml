name: tests

on:
  push:
      branches: [ main, staging ]

  pull_request:
    branches: [ main, staging, develop ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/php-setup
      - run: composer type

  coverage:
    runs-on: ubuntu-latest
    environment: testing

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sail -d testing"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: sail
      DB_PASSWORD: password

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/php-setup
        with: { coverage: xdebug }
      - uses: actions/setup-node@v6
        with: { node-version: '24' }
      - run: npm ci && npm run build
      - run: cp .env.example .env && php artisan key:generate
      - run: composer coverage
