name: lint

on:
  pull_request:
    branches: [ main, staging, develop ]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    environment: testing

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/php-setup

      - name: run linting
        run: composer lint

      - name: commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: fix code style
          file_pattern: '**/*.php'
