name: php-setup
description: Setup PHP 8.5, FFI, and install composer deps with two-pass workaround

inputs:
  coverage:
    description: coverage driver
    required: false
    default: none

runs:
  using: composite
  steps:
    - name: setup php
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: ffi
        ini-values: ffi.enable=true
        coverage: ${{ inputs.coverage }}

    - uses: actions/cache@v4
      id: composer-cache
      with:
        path: vendor
        key: composer-v2-${{ hashFiles('composer.lock') }}
        restore-keys: composer-v2-

    - name: install dependencies
      shell: bash
      run: |
        composer install --no-interaction --prefer-dist --no-plugins --no-scripts
        composer dump-autoload --no-scripts
        composer install --no-interaction --prefer-dist

    - name: ensure duckdb native library
      shell: bash
      run: |
        if [ ! -f vendor/satur.io/duckdb/lib/duckdb-ffi.h ]; then
          php -r "require 'vendor/autoload.php'; Saturio\DuckDB\CLib\Installer::install();"
        fi
        test -f vendor/satur.io/duckdb/lib/duckdb-ffi.h
        test -f vendor/satur.io/duckdb/lib/libduckdb.so
